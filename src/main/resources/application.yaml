spring:
  application:
    name: fix-acceptor

fix:
  acceptor:
    enabled: true
    sessions:
      - port: 9878
        begin-string: FIX.4.4
        sender-comp-id: ACCEPTOR
        target-comp-id: INITIATOR1
        heartbeat-interval-seconds: 30
        send-interval-seconds: 10
        send-total-orders: 3
        symbol: DEMO
        quantity: 100
        side: BUY
      - port: 9878
        begin-string: FIX.4.4
        sender-comp-id: ACCEPTOR
        target-comp-id: INITIATOR2
        heartbeat-interval-seconds: 30
        send-interval-seconds: 10
        send-total-orders: 3
        symbol: DEMO
        quantity: 100
        side: SELL
